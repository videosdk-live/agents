syntax = "proto3";

package turn_detector;

service TurnDetection {
  rpc Predict(TurnRequest) returns (TurnResponse) {}
  rpc Health(HealthRequest) returns (HealthResponse) {}
}

message TurnRequest {
  string text = 1;
  string model_id = 2; // "gemma" or "roberta"
}

message TurnResponse {
  string state = 1; // "Incomplete" | "Complete" | "Backchannel" | "Wait"
  uint64 latency_ms = 2; // Model compute time in milliseconds
  string model_id = 3; // Echo of which model served this request
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  repeated string loaded_models = 2; // e.g. ["gemma", "roberta"]
  string server_version = 3;
}
